<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<title>Livestreams — Live streaming platform</title>
		<meta
			name="description"
			content="Go live over RTMP/SRT with adaptive HLS, recordings, multistream to YouTube & Twitch, webhooks, and a developer API."
		/>
		<meta name="theme-color" content="#e11d48" />
		<meta name="color-scheme" content="light dark" />

		<!-- Open Graph / social -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Livestreams" />
		<meta
			property="og:description"
			content="Live streaming platform — RTMP/SRT ingest, adaptive HLS, recordings, multistream, webhooks, and an API."
		/>
		<meta name="twitter:card" content="summary" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
